              value:
                errors: ["message": "Malformed"]
    '401':
      description: Unauthorized - tenant context not found or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            unauthorized:
              value:
                errors: ["message": "Unauthorized"]
    '403':
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            notAllowed:
              value:
                errors: ["message": "Not allowed to perform this action"]
    '404':
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            subscriptionNotFound:
              value:
                errors: ["message": "Subscription not found"]
    '409':
      description: Subscription is deleted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            subscriptionDeleted:
              value:
                errors: ["message": "Subscription deleted"]