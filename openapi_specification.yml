    Log:
      type: object
      properties:
        log_id:
          type: string
          description: Unique identifier for the log.
          example: "f32a1b1a-98df-4d5c-9e93-75e213678b3e"
        log_type:
          type: string
          description: Type of the log, either "action" or "error".
          example: "error"
          enum: ["action", "error"]
        timestamp:
          type: string
          format: date-time
          description: Timestamp of when the log was created.
          example: "2024-11-15T12:34:56Z"
        subscriber_id:
          type: string
          description: Subscriber ID associated with the log.
          example: "aa0f5c91-41ea-4c06-b3a3-af765e2ab07f"
        subscription_id:
          type: string
          description: Subscription ID associated with the log.
          example: "72c265f6-22ac-401a-ba75-d1b30c4653e5"
        error_type:
          type: string
          description: The type of error logged (if applicable).
          example: "validation_error"
        error_code:
          type: integer
          description: HTTP status code or application-specific error code.
          example: 400
        error_message:
          type: string
          description: A detailed description of the error (if applicable).
          example: "Invalid request"
